<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500">
  <defs>
    <linearGradient id="diagGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f5d4;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#00f5d4;stop-opacity:0" />
    </linearGradient>
    <pattern id="gridPattern" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="50" stroke="#1a1a2f" stroke-width="0.5" opacity="0.3"/>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#1a1a2f" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>
  
  <!-- Main background -->
  <rect width="1500" height="500" fill="#0a0a0f"/>
  
  <!-- Left half: grid pattern (40% = 600px) -->
  <rect x="0" y="0" width="600" height="500" fill="url(#gridPattern)"/>
  
  <!-- Right half: gradient overlay (60% = 900px) -->
  <rect x="600" y="0" width="900" height="500" fill="url(#diagGradient)"/>
  
  <!-- Optional: VORN text in bottom right -->
  <text x="1350" y="420" 
        font-family="'IBM Plex Mono', monospace" 
        font-size="120" 
        font-weight="bold"
        fill="#ffffff" 
        opacity="0.7"
        text-anchor="end"
        letter-spacing="8">VORN</text>
  
</svg>